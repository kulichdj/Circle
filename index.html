<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle LF — Жизнь как RPG</title>
    <style>
        :root {
            --bg-color: #0b0b0d;
            --panel-bg: rgba(25, 25, 28, 0.65);
            --text-color: #ffffff;
            --text-muted: #8e8e93;
            --accent-color: #af52de;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(20px);
        }

        .light-theme {
            --bg-color: #f2f2f7;
            --panel-bg: rgba(255, 255, 255, 0.70);
            --text-color: #000000;
            --text-muted: #6c6c72;
            --glass-border: rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.4s, color 0.4s;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Хедер управления темами */
        .header-controls {
            display: flex;
            justify-content: flex-end;
            padding: 4px;
        }

        .btn-theme {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            color: var(--text-color);
            padding: 10px 16px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        /* Премиум стеклянные панели (Glassmorphic) */
        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
        }

        /* Профиль */
        .profile-section {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .circle-progress-wrapper {
            position: relative;
            width: 72px;
            height: 72px;
        }

        .circle-svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .circle-bg { fill: none; stroke: rgba(142, 142, 147, 0.12); stroke-width: 5.5; }
        .circle-fill { fill: none; stroke-width: 5.5; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease-in-out; }

        .circle-inner-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 19px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .profile-info h2 { font-size: 21px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 2px; }
        .profile-info p { font-size: 13px; color: var(--text-muted); font-weight: 400; }

        /* Эстетичная сетка категорий */
        .grid-categories {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .category-card {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            border-radius: 22px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            box-shadow: 0 4px 24px 0 rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease;
        }

        .category-card:active { transform: scale(0.97); }
        .category-card .circle-progress-wrapper { width: 46px; height: 46px; }
        .category-card .circle-inner-text { font-size: 14px; font-weight: 600; }
        .category-card .circle-bg, .category-card .circle-fill { stroke-width: 4.5; }

        .cat-det h4 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; margin-bottom: 2px; }
        .cat-det p { font-size: 11px; color: var(--text-muted); font-weight: 500; }

        /* Формы и кнопки */
        .input-field {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.25);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .light-theme .input-field { background: rgba(255, 255, 255, 0.5); }
        .input-field:focus { border-color: var(--accent-color); }

        .select-field {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.25);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
        }
        .light-theme .select-field { background: rgba(255, 255, 255, 0.5); }

        .btn-action {
            background: var(--accent-color);
            border: none;
            color: #ffffff;
            padding: 14px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(175, 82, 222, 0.3);
            transition: opacity 0.2s;
        }
        .btn-action:active { opacity: 0.85; }

        /* Окно авторизации iOS Блокировка */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(25px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: rgba(30, 30, 35, 0.7);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(30px);
            padding: 28px;
            border-radius: 28px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }
        .light-theme .modal-content {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .modal-content h3 { margin-bottom: 8px; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        .modal-content p { font-size: 14px; color: var(--text-muted); margin-bottom: 22px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Верхняя кнопка переключения темы -->
        <div class="header-controls">
            <button class="btn-theme" id="themeToggle" onclick="toggleTheme()">🌙 Темная</button>
        </div>

        <!-- Профиль главного Ядра -->
        <div class="glass-panel">
            <div class="profile-section">
                <div class="circle-progress-wrapper">
                    <svg class="circle-svg">
                        <circle class="circle-bg" cx="36" cy="36" r="32"></circle>
                        <circle class="circle-fill" id="coreCircle" cx="36" cy="36" r="32" stroke="#af52de" stroke-dasharray="201" stroke-dashoffset="201"></circle>
                    </svg>
                    <div class="circle-inner-text" id="coreLevel">1</div>
                </div>
                <div class="profile-info">
                    <h2 id="userNameDisplay">@user</h2>
                    <p id="coreXpText">Уровень ядра: 0 / 100 XP</p>
                </div>
            </div>
        </div>

        <!-- Основная сетка сфер прокачки -->
        <div class="grid-categories" id="categoriesGrid">
            <!-- Кольца опыта генерятся из JS -->
        </div>

        <!-- Панель динамического добавления сфер -->
        <div class="glass-panel">
            <h4 style="font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px;">Добавить новую сферу</h4>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <input type="text" id="newSphereName" class="input-field" placeholder="Название (например, Финансы)">
                <select id="newSphereColor" class="select-field">
                    <option value="#8e44ad">Фиолетовый</option>
                    <option value="#27ae60">Зеленый</option>
                    <option value="#2980b9">Синий</option>
                    <option value="#c0392b">Красный</option>
                    <option value="#e67e22">Оранжевый</option>
                    <option value="#00d2d3">Бирюзовый</option>
                </select>
                <button class="btn-action" onclick="addNewSphere()">Создать сферу</button>
            </div>
        </div>

    </div>

    <!-- МОДАЛКА СТРОГОГО ВХОДА (ПРОПУСТИТЬ ТАПОМ НЕЛЬЗЯ) -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-content">
            <h3>Вход в Circle LF</h3>
            <p>Добро пожаловать. Пожалуйста, укажите свой логин, чтобы разблокировать систему RPG-прокачки.</p>
            <input type="text" id="usernameInput" class="input-field" placeholder="Введите свой логин" style="margin-bottom: 18px;">
            <button class="btn-action" onclick="saveLogin()">Авторизоваться</button>
        </div>
    </div>

    <script>
        // Чистый стейт со стандартной базой кругов
        let state = {
            user: "z-test-user",
            isAuthorized: false,
            theme: "dark",
            levels: { core: 1 },
            xp: { core: 0 },
            spheres: [
                { id: "job", name: "Работа", color: "#8e44ad", level: 0, xp: 0 },
                { id: "hobby", name: "Хобби", color: "#27ae60", level: 0, xp: 0 },
                { id: "relax", name: "Отдых", color: "#2980b9", level: 0, xp: 0 },
                { id: "sport", name: "Спорт", color: "#c0392b", level: 0, xp: 0 }
            ]
        };

        window.onload = function() {
            const cached = localStorage.getItem('circle_lf_glass_state');
            if (cached) {
                state = JSON.parse(cached);
            }

            // Инициализация темы
            if (state.theme === "light") {
                document.body.classList.add('light-theme');
                document.getElementById('themeToggle').innerText = "☀️ Светлая";
            }

            // Проверка авторизации
            if (!state.isAuthorized || state.user === "z-test-user") {
                document.getElementById('loginModal').classList.add('active');
            } else {
                updateUI();
            }
        };

        function saveState() {
            localStorage.setItem('circle_lf_glass_state', JSON.stringify(state));
        }

        // Авторизация
        function saveLogin() {
            const val = document.getElementById('usernameInput').value.trim();
            if (!val) {
                alert("Логин не может быть пустым!");
                return;
            }
            state.user = val.startsWith('@') ? val : '@' + val;
            state.isAuthorized = true;
            saveState();
            document.getElementById('loginModal').classList.remove('active');
            updateUI();
        }

        // Переключение темы интерфейса
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeToggle');
            if (body.classList.contains('light-theme')) {
                body.classList.remove('light-theme');
                btn.innerText = "🌙 Темная";
                state.theme = "dark";
            } else {
                body.classList.add('light-theme');
                btn.innerText = "☀️ Светлая";
                state.theme = "light";
            }
            saveState();
        }

        // Клик по кольцу — начисление прогресса
        function gainXp(sphereId) {
            const sphere = state.spheres.find(s => s.id === sphereId);
            if (!sphere) return;

            sphere.xp += 25;
            state.xp.core += 10;

            if (sphere.xp >= 100) {
                sphere.level += 1;
                sphere.xp = 0;
            }

            if (state.xp.core >= 100) {
                state.levels.core += 1;
                state.xp.core = 0;
            }

            saveState();
            updateUI();
        }

        // Функция динамического добавления сфер
        function addNewSphere() {
            const nameInput = document.getElementById('newSphereName');
            const name = nameInput.value.trim();
            const color = document.getElementById('newSphereColor').value;

            if (!name) {
                alert("Укажите имя новой сферы!");
                return;
            }

            state.spheres.push({
                id: 'sphere_' + Date.now(),
                name: name,
                color: color,
                level: 0,
                xp: 0
            });

            nameInput.value = "";
            saveState();
            updateUI();
        }

        // Генерация кругов опыта в сетке
        function renderSpheres() {
            const grid = document.getElementById('categoriesGrid');
            grid.innerHTML = "";

            state.spheres.forEach(s => {
                const offset = 119.3 - (119.3 * s.xp / 100);
                
                const card = document.createElement('div');
                card.className = "category-card";
                card.onclick = () => gainXp(s.id);
                card.innerHTML = `
                    <div class="circle-progress-wrapper">
                        <svg class="circle-svg">
                            <circle class="circle-bg" cx="22" cy="22" r="19"></circle>
                            <circle class="circle-fill" cx="22" cy="22" r="19" stroke="${s.color}" stroke-dasharray="119.3" stroke-dashoffset="${offset}"></circle>
                        </svg>
                        <div class="circle-inner-text">${s.level}</div>
                    </div>
                    <div class="cat-det">
                        <h4>${s.name}</h4>
                        <p>${s.xp} / 100 XP</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Обновление интерфейса
        function updateUI() {
            document.getElementById('userNameDisplay').innerText = state.user;
            document.getElementById('coreLevel').innerText = state.levels.core;
            document.getElementById('coreXpText').innerText = `Уровень ядра: ${state.xp.core} / 100 XP`;

            const coreOffset = 201 - (201 * state.xp.core / 100);
            document.getElementById('coreCircle').style.strokeDashoffset = coreOffset;

            renderSpheres();
        }
    </script>
</body>
</html>
