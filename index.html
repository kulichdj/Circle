<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle LF — Жизнь как RPG</title>
    <style>
        :root {
            --bg-color: #0b0b0d;
            --panel-bg: rgba(25, 25, 28, 0.65);
            --text-color: #ffffff;
            --text-muted: #8e8e93;
            --accent-color: #af52de;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(20px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Панели */
        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            border-radius: 24px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Профиль */
        .profile-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .circle-progress-wrapper {
            position: relative;
            width: 70px;
            height: 70px;
        }

        .circle-svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .circle-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 6; }
        .circle-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.5s; }

        .circle-inner-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: bold;
        }

        .profile-info h2 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
        .profile-info p { font-size: 13px; color: var(--text-muted); }

        /* Сетки категорий */
        .grid-categories {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .category-card {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            border-radius: 20px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .category-card .circle-progress-wrapper { width: 44px; height: 44px; }
        .category-card .circle-inner-text { font-size: 13px; }
        .category-card .circle-bg, .category-card .circle-fill { stroke-width: 5; }

        .cat-det h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .cat-det p { font-size: 11px; color: var(--text-muted); }

        /* Кнопки и инпуты */
        .btn-action {
            background: var(--accent-color);
            border: none;
            color: #fff;
            padding: 12px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }

        .btn-action:active { opacity: 0.8; }

        .input-field {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        .select-field {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            margin-bottom: 10px;
        }

        /* Модалка авторизации */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 360px;
            text-align: center;
        }

        .modal-content h3 { margin-bottom: 12px; font-size: 20px; }
        .modal-content p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Профиль -->
        <div class="glass-panel">
            <div class="profile-section">
                <div class="circle-progress-wrapper">
                    <svg class="circle-svg">
                        <circle class="circle-bg" cx="35" cy="35" r="31"></circle>
                        <circle class="circle-fill" id="coreCircle" cx="35" cy="35" r="31" stroke="#af52de" stroke-dasharray="194.7" stroke-dashoffset="194.7"></circle>
                    </svg>
                    <div class="circle-inner-text" id="coreLevel">1</div>
                </div>
                <div class="profile-info">
                    <h2 id="userNameDisplay">@user</h2>
                    <p id="coreXpText">Уровень ядра: 0 / 100 XP</p>
                </div>
            </div>
        </div>

        <!-- Сетка сфер прокачки -->
        <div class="grid-categories" id="categoriesGrid">
            <!-- Сферы генерируются динамически через JS -->
        </div>

        <!-- Панель добавления новых сфер -->
        <div class="glass-panel">
            <h4 style="font-size: 14px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Создать новую сферу</h4>
            <input type="text" id="newSphereName" class="input-field" placeholder="Название (например, Спорт, Финансы)" style="margin-bottom: 10px;">
            <select id="newSphereColor" class="select-field">
                <option value="#8e44ad">Фиолетовый</option>
                <option value="#27ae60">Зеленый</option>
                <option value="#2980b9">Синий</option>
                <option value="#c0392b">Красный</option>
                <option value="#e67e22">Оранжевый</option>
                <option value="#f1c40f">Желтый</option>
            </select>
            <button class="btn-action" onclick="addNewSphere()">Добавить сферу</button>
        </div>

    </div>

    <!-- МОДАЛКА ОБЯЗАТЕЛЬНОЙ АВТОРИЗАЦИИ -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-content">
            <h3>Вход в систему</h3>
            <p>Введите ваш уникальный логин для кастомизации игрового профиля.</p>
            <input type="text" id="usernameInput" class="input-field" placeholder="Введите свой логин" style="margin-bottom: 16px;">
            <button class="btn-action" onclick="saveLogin()">Запустить приложение</button>
        </div>
    </div>

    <script>
        // Базовый стейт с дефолтными сферами, как было раньше
        let state = {
            user: "z-test-user",
            isAuthorized: false,
            levels: { core: 1 },
            xp: { core: 0 },
            spheres: [
                { id: "job", name: "Работа", color: "#8e44ad", level: 0, xp: 0 },
                { id: "hobby", name: "Хобби", color: "#27ae60", level: 0, xp: 0 },
                { id: "relax", name: "Отдых", color: "#2980b9", level: 0, xp: 0 },
                { id: "sport", name: "Спорт", color: "#c0392b", level: 0, xp: 0 }
            ]
        };

        window.onload = function() {
            const savedData = localStorage.getItem('circle_lf_base_state');
            if (savedData) {
                state = JSON.parse(savedData);
            }

            // Жесткая проверка авторизации
            if (!state.isAuthorized || state.user === "z-test-user") {
                document.getElementById('loginModal').classList.add('active');
            } else {
                updateUI();
            }
        };

        function saveState() {
            localStorage.setItem('circle_lf_base_state', JSON.stringify(state));
        }

        function saveLogin() {
            const loginInput = document.getElementById('usernameInput').value.trim();
            if (!loginInput) {
                alert("Пожалуйста, введите логин!");
                return;
            }
            state.user = loginInput.startsWith('@') ? loginInput : '@' + loginInput;
            state.isAuthorized = true;
            saveState();
            document.getElementById('loginModal').classList.remove('active');
            updateUI();
        }

        // Клик по сфере симулирует начисление опыта (как в старой версии)
        function gainXp(sphereId) {
            const sphere = state.spheres.find(s => s.id === sphereId);
            if (!sphere) return;

            sphere.xp += 25;
            state.xp.core += 10; // Опыт в ядро

            // Левелап сферы
            if (sphere.xp >= 100) {
                sphere.level += 1;
                sphere.xp = 0;
            }

            // Левелап ядра
            if (state.xp.core >= 100) {
                state.levels.core += 1;
                state.xp.core = 0;
            }

            saveState();
            updateUI();
        }

        // Функция динамического добавления новых кругов
        function addNewSphere() {
            const nameInput = document.getElementById('newSphereName');
            const name = nameInput.value.trim();
            const color = document.getElementById('newSphereColor').value;

            if (!name) {
                alert("Введите название сферы!");
                return;
            }

            const id = 'sphere_' + Date.now();
            state.spheres.push({
                id: id,
                name: name,
                color: color,
                level: 0,
                xp: 0
            });

            nameInput.value = "";
            saveState();
            updateUI();
        }

        // Рендер сфер в сетку
        function renderSpheres() {
            const grid = document.getElementById('categoriesGrid');
            grid.innerHTML = "";

            state.spheres.forEach(s => {
                const offset = 119.3 - (119.3 * s.xp / 100);
                
                const card = document.createElement('div');
                card.className = "category-card";
                card.onclick = () => gainXp(s.id);
                card.innerHTML = `
                    <div class="circle-progress-wrapper">
                        <svg class="circle-svg">
                            <circle class="circle-bg" cx="22" cy="22" r="19"></circle>
                            <circle class="circle-fill" cx="22" cy="22" r="19" stroke="${s.color}" stroke-dasharray="119.3" stroke-dashoffset="${offset}"></circle>
                        </svg>
                        <div class="circle-inner-text">${s.level}</div>
                    </div>
                    <div class="cat-det">
                        <h4>${s.name}</h4>
                        <p>${s.xp} / 100 XP</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Синхронизация данных с интерфейсом
        function updateUI() {
            document.getElementById('userNameDisplay').innerText = state.user;
            document.getElementById('coreLevel').innerText = state.levels.core;
            document.getElementById('coreXpText').innerText = `Уровень ядра: ${state.xp.core} / 100 XP`;

            const coreOffset = 194.7 - (194.7 * state.xp.core / 100);
            document.getElementById('coreCircle').style.strokeDashoffset = coreOffset;

            renderSpheres();
        }
    </script>
</body>
</html>
